BR2_TARGET_GENERIC_HOSTNAME=""
BR2_TARGET_GENERIC_ISSUE="Welcome to SnapDog OS"
BR2_TARGET_GENERIC_PASSWD_SHA256=y
BR2_TARGET_GENERIC_PASSWD_METHOD="sha-256"
BR2_INIT_BUSYBOX=n
BR2_INIT_SYSTEMD=y
BR2_INIT_SYSTEMD_POPULATE_TMPFILES=y
BR2_TARGET_ROOTFS_EXT2_SIZE="512M"
BR2_TARGET_GENERIC_ROOT_PASSWD="snapdog"

# Linux 6.6 LTS (rpi-6.6.y, 6.6.78, 2025-03-26)
BR2_LINUX_KERNEL_CUSTOM_TARBALL_LOCATION="$(call github,raspberrypi,linux,bba53a117a4a5c29da892962332ff1605990e17a)/linux-bba53a117a4a5c29da892962332ff1605990e17a.tar.gz"
BR2_LINUX_KERNEL_VERSION="custom"
BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES="../snapdog-os/buildroot/kernel.fragment"
BR2_PACKAGE_HOST_LINUX_HEADERS_CUSTOM_6_6=y

BR2_ROOTFS_OVERLAY="../snapdog-os/buildroot/board/raspberrypi/overlay/"
BR2_ROOTFS_POST_IMAGE_SCRIPT="../snapdog-os/buildroot/board/raspberrypi/post-image-ab.sh"
BR2_PER_PACKAGE_DIRECTORIES=n
BR2_DOWNLOAD_FORCE_CHECK_HASHES=n
BR2_ROOTFS_POST_BUILD_SCRIPT="../snapdog-os/buildroot/board/raspberrypi/post-build.sh"

# RAUC OTA update framework
BR2_PACKAGE_RAUC=y
# D-Bus service (de.pengutronix.rauc): required — snapdog-ctrl drives rauc over
# D-Bus, so without this rauc is CLI-only and every install trigger 500s.
BR2_PACKAGE_RAUC_DBUS=y

# First-boot /data grow needs resize2fs (grow the baked 128 MiB ext4 to fill the
# card). e2fsprogs core is already present (e2fsck/dumpe2fs) but its resize2fs
# applet is a separate sub-option and was NOT built, so the old resize path was a
# silent no-op.
BR2_PACKAGE_E2FSPROGS=y
BR2_PACKAGE_E2FSPROGS_RESIZE2FS=y

# Compiler cache (speeds up rebuilds on persistent runners)
BR2_CCACHE=y

# WiFi support (hostapd, dnsmasq, wpa_supplicant, firmware)
BR2_PACKAGE_RASPI_WIFI=y
# Regulatory database — without it cfg80211 logs "failed to load regulatory.db"
# and the radio can't honour a country's channels, crippling scans/association.
BR2_PACKAGE_WIRELESS_REGDB=y
# iw: low-level nl80211 tooling (diagnostics + direct scan fallback path).
BR2_PACKAGE_IW=y
