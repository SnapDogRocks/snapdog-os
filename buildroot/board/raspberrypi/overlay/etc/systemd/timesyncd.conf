# systemd-timesyncd NTP configuration.
#
# The Pi has no RTC, so a correct clock depends entirely on NTP. Without this file
# the buildroot systemd build falls back to Google's compiled-in time servers, which
# are undocumented and blocked on some networks. Set explicit, universal pool servers.
#
# NTP= is left empty so DHCP-provided NTP servers (option 42) take precedence when
# offered; FallbackNTP= is used otherwise.
[Time]
NTP=
FallbackNTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
