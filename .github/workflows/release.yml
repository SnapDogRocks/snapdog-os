# Release pipeline
name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "assets/**"
      - ".githooks/**"
      - ".github/dependabot.yml"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  R2_BUCKET: snapdog-updates
  BUILDROOT_VERSION: "2025.02"
  RUST_TOOLCHAIN: "stable"
  NODE_VERSION: "26.5.0"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.ver.outputs.channel }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          token: ${{ secrets.TAP_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge for release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          PR_JSON: ${{ steps.rp.outputs.pr }}
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail
          # release-please-action's `pr` output is a PullRequest object with
          # `.number` — it has NO `.html_url`. The old `.html_url` lookup returned
          # "null", so this block was silently skipped (step stayed green) and
          # auto-merge was never enabled → release PRs lingered until merged by hand.
          # No `gh pr review --approve`: main requires no approval, and the release
          # PR is bot-authored so a bot self-approve would error and fail the step.
          PR_NUMBER=$(echo "$PR_JSON" | jq -r .number)
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "Enabling auto-merge for release PR #${PR_NUMBER}"
            # No --delete-branch: this job has no actions/checkout, and gh's
            # branch cleanup needs a local git repo, so --delete-branch fails the
            # step with "fatal: not a git repository". GitHub merges server-side;
            # release-please recreates its branch anyway.
            gh pr merge --auto --squash "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
          fi

      # Single point where version + channel are decided (consumed by build-image
      # and publish). On a release: the exact release-please version. On a beta:
      # the version of the NEXT release, so a beta always sorts ABOVE the latest
      # stable (beta = "stable-plus"). Prefer the pending version from the open
      # release-please branch (the real next release); with nothing pending,
      # patch-bump the shipped version — after 0.9.4 ships betas become
      # 0.9.5-beta.N, and 0.9.4 < 0.9.5-beta.N < 0.9.5 (SemVer-correct).
      # (The release publish also advances the beta pointer to the release when
      # it outranks the current beta — see "Advance beta pointer" below.)
      - name: Compute version and channel
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ steps.rp.outputs.release_created }}" = "true" ]; then
            echo "version=${{ steps.rp.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "channel=release" >> "$GITHUB_OUTPUT"
          else
            repo="${{ github.repository }}"
            file=".release-please-manifest.json"
            # Latest shipped version (release-type simple bumps this on release).
            stable=$(gh api "repos/${repo}/contents/${file}" \
              -H "Accept: application/vnd.github.raw" | jq -r '."."')
            # Pending version from the open release-please branch, if any.
            pending=$(gh api "repos/${repo}/contents/${file}?ref=release-please--branches--main" \
              -H "Accept: application/vnd.github.raw" 2>/dev/null | jq -r '."."' 2>/dev/null || true)
            if [ -n "$pending" ] && [ "$pending" != "null" ] && [ "$pending" != "$stable" ]; then
              next="$pending"           # the real next release (always > stable)
            else
              IFS=. read -r MA MI PA <<< "$stable"
              next="${MA}.${MI}.$((PA + 1))"   # no pending → preview next patch
            fi
            echo "version=${next}-beta.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          fi

  build-ctrl:
    name: Build snapdog-ctrl
    runs-on: ubuntu-24.04
    needs: release-please
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target aarch64-unknown-linux-gnu
          rustup default "$RUST_TOOLCHAIN"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: snapdog-ctrl
          key: aarch64-release

      - name: Install aarch64 linker
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          printf 'Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports\nSuites: noble noble-updates\nComponents: main universe\nArchitectures: arm64\n' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
            libavahi-compat-libdnssd-dev:arm64

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
        run: |
          # npm ci (not install): install strictly from the lockfile and never
          # rewrite it. `npm install` reformats package-lock.json (optional-dep
          # libc metadata) under CI's npm, dirtying the tree before build.rs runs
          # `git describe --dirty`, which tagged the release binary `x.y.z-dirty`.
          cd snapdog-ctrl/webui && npm ci --prefer-offline && npm run build && cd ../..
          cd snapdog-ctrl && cargo build --locked --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/snapdog-ctrl ../snapdog-ctrl-binary

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapdog-ctrl-binary
          path: snapdog-ctrl-binary
          if-no-files-found: error
          retention-days: 7

  build-image:
    name: Build image (${{ matrix.board }})
    runs-on: ubuntu-24.04
    needs: [release-please, build-ctrl]
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        board: [pi3, pi4, pi5, zero2w]
    env:
      BR2_DL_DIR: ${{ github.workspace }}/.buildroot-cache/dl
      BR2_CCACHE_DIR: ${{ github.workspace }}/.buildroot-cache/ccache/${{ matrix.board }}
      CCACHE_COMPRESS: "1"
      CCACHE_MAXSIZE: 4G
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: snapdog-ctrl-binary

      - name: Free runner disk space
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install image build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            build-essential \
            ca-certificates \
            cpio \
            e2fsprogs \
            fdisk \
            file \
            flex \
            gettext \
            git \
            jq \
            libarchive-tools \
            libssl-dev \
            locales \
            make \
            mtools \
            openssl \
            parted \
            patch \
            perl \
            python3 \
            rauc \
            rsync \
            unzip \
            wget \
            xz-utils \
            zstd

      - name: Restore Buildroot source cache
        id: cache-buildroot-src
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ../buildroot-src
          key: buildroot-src-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('buildroot/scripts/patch-buildroot') }}

      - name: Restore Buildroot download cache
        id: cache-buildroot-dl
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.BR2_DL_DIR }}
          key: buildroot-dl-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ matrix.board }}-${{ hashFiles('buildroot/**/*.mk', 'buildroot/**/*.hash', 'buildroot/configs/override.conf', 'buildroot/scripts/patch-buildroot') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            buildroot-dl-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ matrix.board }}-${{ hashFiles('buildroot/**/*.mk', 'buildroot/**/*.hash', 'buildroot/configs/override.conf', 'buildroot/scripts/patch-buildroot') }}-
            buildroot-dl-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ matrix.board }}-
            buildroot-dl-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-

      - name: Restore Buildroot compiler cache
        id: cache-buildroot-ccache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.BR2_CCACHE_DIR }}
          key: buildroot-ccache-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ matrix.board }}-${{ hashFiles('buildroot/**/*.mk', 'buildroot/**/*.hash', 'buildroot/configs/override.conf', 'buildroot/kernel.fragment', 'buildroot/scripts/patch-buildroot') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            buildroot-ccache-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ matrix.board }}-${{ hashFiles('buildroot/**/*.mk', 'buildroot/**/*.hash', 'buildroot/configs/override.conf', 'buildroot/kernel.fragment', 'buildroot/scripts/patch-buildroot') }}-
            buildroot-ccache-${{ runner.os }}-${{ env.BUILDROOT_VERSION }}-${{ matrix.board }}-

      - name: Setup buildroot
        run: |
          set -euo pipefail
          mkdir -p "$BR2_DL_DIR" "$BR2_CCACHE_DIR" "../buildroot-${{ matrix.board }}"
          make setup

      - name: Build
        run: |
          set -euo pipefail
          chmod 755 snapdog-ctrl-binary
          make BOARD=${{ matrix.board }} VERSION="${{ needs.release-please.outputs.version }}" config
          make BOARD=${{ matrix.board }} VERSION="${{ needs.release-please.outputs.version }}" build

      - name: Generate Buildroot legal manifest
        run: |
          set -euo pipefail
          cd ../buildroot
          make O="${{ github.workspace }}/../buildroot-${{ matrix.board }}" \
            BR2_EXTERNAL="${{ github.workspace }}/buildroot" \
            SNAPDOG_BOARD="${{ matrix.board }}" \
            legal-info

      - name: Report Buildroot cache usage
        if: always()
        run: |
          set -euo pipefail
          du -sh "$BR2_DL_DIR" "$BR2_CCACHE_DIR" 2>/dev/null || true
          if [ -x "../buildroot-${{ matrix.board }}/host/bin/ccache" ]; then
            "../buildroot-${{ matrix.board }}/host/bin/ccache" -s || true
          fi

      - name: Package
        id: package
        run: |
          set -euo pipefail
          test -n "${{ secrets.RAUC_CA_KEY_PEM }}" || { echo "Missing RAUC_CA_KEY_PEM secret" >&2; exit 1; }
          VERSION="${{ needs.release-please.outputs.version }}"
          IMG="../buildroot-${{ matrix.board }}/images/sdcard.img"
          OUT="snapdog-os-${{ matrix.board }}-${VERSION}.img.gz"
          BUNDLE="snapdog-os-${{ matrix.board }}-${VERSION}.raucb"
          SBOM="snapdog-os-${{ matrix.board }}-${VERSION}-sbom.csv"
          CHECKSUMS="snapdog-os-${{ matrix.board }}-${VERSION}.sha256"

          test -s "$IMG"
          PARTITIONS=$(sfdisk -J "$IMG" | jq '.partitiontable.partitions | length')
          test "$PARTITIONS" -eq 4

          gzip -n -c "$IMG" > "$OUT"
          cp "../buildroot-${{ matrix.board }}/legal-info/manifest.csv" "$SBOM"

          # Generate RAUC bundle
          umask 077
          printf '%s\n' "${{ secrets.RAUC_CA_KEY_PEM }}" > rauc-ca.key.pem
          RAUC_KEY_FILE="$(pwd)/rauc-ca.key.pem" \
            buildroot/rauc/create-bundle.sh \
            "${{ matrix.board }}" "$VERSION" \
            "../buildroot-${{ matrix.board }}/images/rootfs.ext4" \
            "$BUNDLE"
          rm -f rauc-ca.key.pem

          sha256sum "$OUT" "$BUNDLE" "$SBOM" > "$CHECKSUMS"

          {
            echo "image=${OUT}"
            echo "bundle=${BUNDLE}"
            echo "sbom=${SBOM}"
            echo "checksums=${CHECKSUMS}"
          } >> "$GITHUB_OUTPUT"

      - name: Trim Buildroot compiler cache
        if: always()
        run: |
          set -euo pipefail
          if [ -x "../buildroot-${{ matrix.board }}/host/bin/ccache" ]; then
            "../buildroot-${{ matrix.board }}/host/bin/ccache" -M "$CCACHE_MAXSIZE" || true
            "../buildroot-${{ matrix.board }}/host/bin/ccache" -c || true
          fi

      - name: Save Buildroot download cache
        if: success() && steps.cache-buildroot-dl.outputs.cache-primary-key != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.BR2_DL_DIR }}
          key: ${{ steps.cache-buildroot-dl.outputs.cache-primary-key }}

      - name: Save Buildroot compiler cache
        if: success() && steps.cache-buildroot-ccache.outputs.cache-primary-key != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.BR2_CCACHE_DIR }}
          key: ${{ steps.cache-buildroot-ccache.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-${{ matrix.board }}
          path: |
            ${{ steps.package.outputs.image }}
            ${{ steps.package.outputs.bundle }}
            ${{ steps.package.outputs.sbom }}
            ${{ steps.package.outputs.checksums }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: [release-please, build-image]
    # Serialize R2 mutations with the retention cron (see retention.yml). Queue,
    # don't cancel — a publish upload must never be interrupted mid-flight.
    concurrency:
      group: r2-maintenance
      cancel-in-progress: false
    environment:
      name: ${{ needs.release-please.outputs.release_created == 'true' && 'stable' || 'beta' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Attest artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/**/*

      - name: Install publish tools
        run: |
          if ! aws --version 2>/dev/null; then
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip" -o /tmp/awscli.zip
            unzip -q /tmp/awscli.zip -d /tmp && sudo /tmp/aws/install
          fi

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail

          test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "Missing R2_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "Missing R2_SECRET_ACCESS_KEY"; exit 1; }
          test -n "${AWS_ENDPOINT_URL:-}" || { echo "Missing R2_ENDPOINT_URL"; exit 1; }

          # Version + channel are decided once in the release-please job (SSOT).
          # This step publishes the ACTIVE channel; a release additionally advances
          # the beta pointer (see "Advance beta pointer to release" below) so beta
          # stays "stable-plus" (always >= the latest release).
          VERSION="${{ needs.release-please.outputs.version }}"
          CHANNEL="${{ needs.release-please.outputs.channel }}"

          IMAGES_JSON='{}'
          for board in pi3 pi4 pi5 zero2w; do
            IMAGE="artifacts/image-${board}/snapdog-os-${board}-${VERSION}.img.gz"
            BUNDLE="artifacts/image-${board}/snapdog-os-${board}-${VERSION}.raucb"
            SBOM="artifacts/image-${board}/snapdog-os-${board}-${VERSION}-sbom.csv"
            CHECKSUMS="artifacts/image-${board}/snapdog-os-${board}-${VERSION}.sha256"

            test -s "$IMAGE"
            test -s "$BUNDLE"
            test -s "$SBOM"
            test -s "$CHECKSUMS"
            (cd "artifacts/image-${board}" && sha256sum --check "snapdog-os-${board}-${VERSION}.sha256")

            # Versioned archives (immutable)
            aws s3 cp "$IMAGE" "s3://${R2_BUCKET}/os/images/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "$BUNDLE" "s3://${R2_BUCKET}/os/bundles/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "$SBOM" "s3://${R2_BUCKET}/os/sbom/" \
              --cache-control "public, max-age=31536000, immutable" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            # Rolling channel pointer (overwritten each build, short cache)
            aws s3 cp "$BUNDLE" "s3://${R2_BUCKET}/os/bundles/snapdog-os-${board}-${CHANNEL}.raucb" \
              --cache-control "public, max-age=300" \
              --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "$IMAGE" "s3://${R2_BUCKET}/os/images/snapdog-os-${board}-${CHANNEL}.img.gz" \
              --cache-control "public, max-age=300" \
              --endpoint-url "$AWS_ENDPOINT_URL"

            SHA=$(sha256sum "$IMAGE" | awk '{print $1}')
            IMAGES_JSON=$(printf '%s' "$IMAGES_JSON" | jq \
              --arg b "$board" \
              --arg f "snapdog-os-${board}-${CHANNEL}.img.gz" \
              --arg s "$SHA" \
              '.[$b] = {image: $f, sha256: $s}')
          done

          # Channel manifest the website reads (SSOT for badge + download).
          jq -n \
            --arg channel "$CHANNEL" \
            --arg version "$VERSION" \
            --arg commit "${GITHUB_SHA}" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson boards "$IMAGES_JSON" \
            '{channel: $channel, version: $version, commit: $commit, date: $date, boards: $boards}' \
            > latest.json
          cat latest.json
          aws s3 cp latest.json "s3://${R2_BUCKET}/os/images/latest-${CHANNEL}.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json" \
            --endpoint-url "$AWS_ENDPOINT_URL"

      # Stable-plus beta: a beta subscriber must always be >= stable. Betas preview
      # the NEXT release, so the instant that release ships the beta pointer would
      # fall behind — advance it to the release (reusing the just-built images, no
      # rebuild) whenever the release outranks the current beta. The channel-alias
      # objects + latest-beta.json are prune-exempt (tools/r2_maintenance.py keeps
      # `…-beta` aliases and `latest-*.json`), so this never fights retention.
      - name: Advance beta pointer to release (stable-plus)
        if: needs.release-please.outputs.release_created == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          REL="${{ needs.release-please.outputs.version }}"

          # Current beta pointer (empty if the beta channel was never published).
          BETA=""
          if aws s3 cp "s3://${R2_BUCKET}/os/images/latest-beta.json" beta-current.json \
               --endpoint-url "$AWS_ENDPOINT_URL" 2>/dev/null; then
            BETA=$(jq -r '.version // ""' beta-current.json)
          fi

          # Advance iff the release outranks the current beta in SemVer, where a
          # final release beats a same-core prerelease (0.9.5 > 0.9.5-beta.7).
          advance=yes
          if [ -n "$BETA" ]; then
            BETA_CORE="${BETA%%-*}"
            if [ "$REL" != "$BETA_CORE" ]; then
              HI=$(printf '%s\n%s\n' "$REL" "$BETA_CORE" | sort -V | tail -1)
              [ "$HI" = "$REL" ] && advance=yes || advance=no
            fi
          fi

          if [ "$advance" != "yes" ]; then
            echo "beta ($BETA) already ahead of release ($REL); leaving beta pointer."
            exit 0
          fi
          echo "Advancing beta pointer: '${BETA:-<none>}' -> release $REL"

          # Copy the release channel aliases onto the beta aliases (server-side,
          # same bucket → no re-upload; identical bytes → identical sha256).
          # --copy-props none: R2 does not implement GetObjectTagging, which the
          # aws-cli calls by default to preserve tags on a copy — skipping props
          # avoids that (NotImplemented) error and does a plain CopyObject.
          for board in pi3 pi4 pi5 zero2w; do
            aws s3 cp \
              "s3://${R2_BUCKET}/os/bundles/snapdog-os-${board}-release.raucb" \
              "s3://${R2_BUCKET}/os/bundles/snapdog-os-${board}-beta.raucb" \
              --copy-props none \
              --cache-control "public, max-age=300" \
              --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp \
              "s3://${R2_BUCKET}/os/images/snapdog-os-${board}-release.img.gz" \
              "s3://${R2_BUCKET}/os/images/snapdog-os-${board}-beta.img.gz" \
              --copy-props none \
              --cache-control "public, max-age=300" \
              --endpoint-url "$AWS_ENDPOINT_URL"
          done

          # Beta manifest mirrors the release manifest (written by the previous
          # step as latest.json), with channel + image filenames rewritten to the
          # beta aliases. Same bytes → the release shas stay valid.
          jq '.channel = "beta"
              | .boards |= with_entries(.value.image |= sub("-release\\."; "-beta."))' \
            latest.json > latest-beta.json
          cat latest-beta.json
          aws s3 cp latest-beta.json "s3://${R2_BUCKET}/os/images/latest-beta.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json" \
            --endpoint-url "$AWS_ENDPOINT_URL"

      - name: Prune superseded betas from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          set -euo pipefail
          python3 -m venv /tmp/r2venv
          /tmp/r2venv/bin/pip install --quiet boto3
          /tmp/r2venv/bin/python tools/r2_maintenance.py --apply

      - name: Attach artifacts to GitHub Release
        if: needs.release-please.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t release_files < <(find artifacts -type f \( \
            -name '*.img.gz' -o \
            -name '*.raucb' -o \
            -name '*-sbom.csv' -o \
            -name '*.sha256' \
          \) | sort)
          test "${#release_files[@]}" -gt 0
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${release_files[@]}" --clobber

  build-update-tool:
    name: Build snapdog-update (${{ matrix.target }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: snapdog-update
      - name: Install cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --manifest-path snapdog-update/Cargo.toml --target ${{ matrix.target }}
      - name: Package
        shell: bash
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ARCHIVE="snapdog-update-${TAG_NAME}-${TARGET}"
          mkdir "$ARCHIVE"
          if [[ "$TARGET" == *"windows"* ]]; then
            cp "snapdog-update/target/${TARGET}/release/snapdog-update.exe" "$ARCHIVE/"
            7z a "${ARCHIVE}.zip" "$ARCHIVE"
            sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          else
            cp "snapdog-update/target/${TARGET}/release/snapdog-update" "$ARCHIVE/"
            tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapdog-update-${{ matrix.target }}
          path: |
            snapdog-update-*.tar.gz
            snapdog-update-*.tar.gz.sha256
            snapdog-update-*.zip
            snapdog-update-*.zip.sha256

  publish-update-tool:
    name: Publish snapdog-update
    needs: [release-please, build-update-tool]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: snapdog-update-*
          path: artifacts
          merge-multiple: true
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" artifacts/*.tar.gz artifacts/*.sha256 artifacts/*.zip \
            --repo ${{ github.repository }} --clobber 2>/dev/null || \
          gh release upload "${{ needs.release-please.outputs.tag_name }}" artifacts/*.tar.gz artifacts/*.sha256 \
            --repo ${{ github.repository }} --clobber
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ needs.release-please.outputs.version }}
          TAG=${{ needs.release-please.outputs.tag_name }}

          X64_SHA=$(sha256sum artifacts/snapdog-update-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          ARM_SHA=$(sha256sum artifacts/snapdog-update-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/SnapDogRocks/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/snapdog-update.rb << EOF
          class SnapdogUpdate < Formula
            desc "Firmware update tool for SnapDog OS"
            homepage "https://github.com/SnapDogRocks/snapdog-os"
            license "GPL-3.0-only"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/SnapDogRocks/snapdog-os/releases/download/${TAG}/snapdog-update-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${X64_SHA}"
              else
                url "https://github.com/SnapDogRocks/snapdog-os/releases/download/${TAG}/snapdog-update-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              end
            end

            def install
              bin.install "snapdog-update"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/snapdog-update --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/snapdog-update.rb
          git diff --cached --quiet || git commit -m "Update snapdog-update to ${VERSION}"
          git push

  trigger-web-redeploy:
    name: Redeploy snapdog-web
    needs: [release-please, publish]
    # OS-only. In release-please manifest mode the root package (".") exposes
    # the UNPREFIXED `release_created` output, so this fires only when the OS
    # distro itself releases — not when snapdog-ctrl / snapdog-update release on
    # their own (those use `<path>--release_created`; the aggregate would be the
    # plural `releases_created`, which we deliberately do not use here).
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_SNAPDOG_WEB_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOOK:-}" ]; then
            echo "::error::VERCEL_SNAPDOG_WEB_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          # snapdog-web (static Astro on Vercel) bakes the latest release tag into
          # the landing-page version badge at build time, so it needs a rebuild
          # after each stable release to pick up the new version.
          echo "Triggering snapdog-web rebuild for ${{ needs.release-please.outputs.tag_name }}…"
          curl -fsS --retry 3 --retry-delay 5 -X POST "$DEPLOY_HOOK"
