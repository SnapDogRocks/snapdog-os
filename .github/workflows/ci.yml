name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: snapdog-ctrl

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      # WebUI checks
      - name: Install webui deps
        run: cd snapdog-ctrl/webui && npm ci

      - name: Lint webui
        run: cd snapdog-ctrl/webui && npx eslint .

      - name: Typecheck webui
        run: cd snapdog-ctrl/webui && npx tsc --noEmit

      - name: Build webui
        run: cd snapdog-ctrl/webui && npm run build

      # Rust checks
      - name: Format check
        run: cd snapdog-ctrl && cargo fmt --check

      - name: Clippy
        run: cd snapdog-ctrl && cargo clippy --all-targets

      - name: Test
        run: cd snapdog-ctrl && cargo test

      - name: Audit
        run: cargo install cargo-audit --locked && cd snapdog-ctrl && cargo audit

  build-aarch64:
    name: Build (aarch64)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: snapdog-ctrl
          key: aarch64

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Build webui
        run: cd snapdog-ctrl/webui && npm ci && npm run build

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cd snapdog-ctrl && cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          cp snapdog-ctrl/target/aarch64-unknown-linux-gnu/release/snapdog-ctrl dist/
          tar -czf snapdog-ctrl-aarch64-unknown-linux-gnu.tar.gz -C dist snapdog-ctrl

      - uses: actions/upload-artifact@v4
        with:
          name: snapdog-ctrl-aarch64
          path: snapdog-ctrl-aarch64-unknown-linux-gnu.tar.gz
