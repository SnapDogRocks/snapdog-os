name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_TOOLCHAIN: "stable"
  # Minimum supported Rust — enforced by the `msrv` job and cross-checked against
  # both Cargo.toml `rust-version` + dev/Dockerfile by scripts/check-version-pins.sh.
  RUST_MSRV: "1.88.0"
  NODE_VERSION: "26.5.0"

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Test release manifest contract
        run: make check-release-manifest

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy
          rustup default "$RUST_TOOLCHAIN"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Install webui deps
        run: cd snapdog-ctrl/webui && npm install --prefer-offline

      - name: WebUI i18n completeness
        run: cd snapdog-ctrl/webui && npm run i18n:check

      - name: Lint webui
        run: cd snapdog-ctrl/webui && npm run lint

      - name: Format (snapdog-ctrl)
        run: cd snapdog-ctrl && cargo fmt --check

      - name: Format (snapdog-update)
        run: cd snapdog-update && cargo fmt --check

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libavahi-compat-libdnssd-dev

      - name: Clippy (snapdog-ctrl)
        run: cd snapdog-ctrl && cargo clippy --locked --all-targets

      - name: Clippy (snapdog-update)
        run: cd snapdog-update && cargo clippy --locked --all-targets

      - name: Test (snapdog-ctrl)
        run: cd snapdog-ctrl && cargo test --locked

      - name: Test (snapdog-update)
        run: cd snapdog-update && cargo test --locked

  msrv:
    name: Rust MSRV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust MSRV
        run: rustup toolchain install "$RUST_MSRV" --profile minimal

      # snapdog-ctrl's build.rs builds the embedded webui, so this Rust check needs
      # Node + node_modules (with node_modules present, build.rs skips its own strict
      # `npm ci`). Use the pinned Node so the lockfile resolves the same as elsewhere.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Install webui deps
        run: cd snapdog-ctrl/webui && npm install --prefer-offline

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libavahi-compat-libdnssd-dev

      - name: Check snapdog-ctrl at MSRV
        run: cd snapdog-ctrl && cargo "+$RUST_MSRV" check --locked --all-targets

      - name: Check snapdog-update at MSRV
        run: cd snapdog-update && cargo "+$RUST_MSRV" check --locked --all-targets

  security-audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Audit snapdog-ctrl Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: snapdog-ctrl

      - name: Audit snapdog-update Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: snapdog-update

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Audit webui runtime deps
        run: cd snapdog-ctrl/webui && npm audit --omit=dev --audit-level=high

  cross-compile:
    name: Cross-compile (aarch64)
    runs-on: ubuntu-24.04
    needs: check
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target aarch64-unknown-linux-gnu
          rustup default "$RUST_TOOLCHAIN"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Install linker
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
          sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          printf 'Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports\nSuites: noble noble-updates\nComponents: main universe\nArchitectures: arm64\n' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
            libavahi-compat-libdnssd-dev:arm64

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
        run: |
          cd snapdog-ctrl/webui && npm install --prefer-offline && npm run build && cd ../..
          cd snapdog-ctrl && cargo build --locked --release --target aarch64-unknown-linux-gnu

      - name: Verify binary
        run: file snapdog-ctrl/target/aarch64-unknown-linux-gnu/release/snapdog-ctrl | grep -q "aarch64"

  release-sanity:
    name: Release Sanity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate release config
        run: |
          ruby -e 'require "json"; JSON.parse(File.read("release-please-config.json")); JSON.parse(File.read(".release-please-manifest.json"))'
          scripts/check-version-pins.sh
          test -x buildroot/board/raspberrypi/post-image-ab.sh
          test -f buildroot/keys/rauc-ca.cert.pem
          test -f buildroot/package/snapdog-rauc/system.conf.in
          test -x buildroot/package/snapdog-rauc/boot-handler.sh
          test -x buildroot/rauc/create-bundle.sh
          grep -q 'partition rootfsA' buildroot/board/raspberrypi/genimage-ab.cfg.in
          grep -q 'partition rootfsB' buildroot/board/raspberrypi/genimage-ab.cfg.in
          openssl x509 -in buildroot/keys/rauc-ca.cert.pem -noout

      - name: Shell syntax
        run: |
          bash -n buildroot/board/raspberrypi/post-image-ab.sh
          bash -n buildroot/rauc/create-bundle.sh
          sh -n buildroot/package/snapdog-rauc/boot-handler.sh
