name: Release snapdog-update

on:
  push:
    tags: ["snapdog-update-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. snapdog-update-v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: snapdog-update-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: stable

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Parse tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          VERSION="${TAG#snapdog-update-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
            echo "Expected tag format snapdog-update-v<version>, got '${TAG}'" >&2
            exit 1
          fi
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build snapdog-update (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.meta.outputs.tag }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target "${{ matrix.target }}"
          rustup default "$RUST_TOOLCHAIN"

      - name: Install Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Install Linux build tools
        if: runner.os == 'Linux' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake

      - name: Build release binary
        working-directory: snapdog-update
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          SNAPDOG_UPDATE_VERSION: ${{ needs.meta.outputs.version }}
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.meta.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="snapdog-update-${TAG}-${TARGET}"

          mkdir "$ARCHIVE"
          cp "snapdog-update/target/${TARGET}/release/snapdog-update" "$ARCHIVE/"
          cp snapdog-update/README.md "$ARCHIVE/README.md"
          cp LICENSE "$ARCHIVE/LICENSE"

          tar -czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          else
            shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snapdog-update-${{ matrix.target }}
          path: |
            snapdog-update-*.tar.gz
            snapdog-update-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-24.04
    needs: [meta, build]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect checksums
        run: |
          set -euo pipefail
          mkdir release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum ./*.tar.gz > SHA256SUMS

      - name: Attest artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release-assets/*

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "snapdog-update ${VERSION}" \
              --notes "snapdog-update ${VERSION}"
          gh release upload "$TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-24.04
    needs: [meta, publish]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          test -n "${TAP_TOKEN:-}" || { echo "Missing HOMEBREW_TAP_TOKEN" >&2; exit 1; }

          MACOS_X64_SHA="$(sha256sum "artifacts/snapdog-update-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)"
          MACOS_ARM64_SHA="$(sha256sum "artifacts/snapdog-update-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/SnapDogRocks/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/snapdog-update.rb << EOF
          class SnapdogUpdate < Formula
            desc "Firmware update client for SnapDog OS"
            homepage "https://github.com/SnapDogRocks/snapdog-os"
            license "GPL-3.0-only"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/SnapDogRocks/snapdog-os/releases/download/${TAG}/snapdog-update-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_X64_SHA}"
              else
                url "https://github.com/SnapDogRocks/snapdog-os/releases/download/${TAG}/snapdog-update-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM64_SHA}"
              end
            end

            def install
              bin.install "snapdog-update"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/snapdog-update --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/snapdog-update.rb
          if git diff --cached --quiet; then
            echo "Formula already current"
          else
            git commit -m "Update snapdog-update to ${VERSION}"
            git push
          fi
