BR2_TARGET_GENERIC_HOSTNAME="snapdog"
BR2_TARGET_GENERIC_ISSUE="Welcome to SnapDog OS"
BR2_TARGET_GENERIC_PASSWD_SHA256=y
BR2_TARGET_GENERIC_PASSWD_METHOD="sha-256"
BR2_INIT_BUSYBOX=n
BR2_INIT_SYSTEMD=y
BR2_INIT_SYSTEMD_POPULATE_TMPFILES=y
BR2_TARGET_ROOTFS_EXT2_SIZE="512M"
BR2_TARGET_GENERIC_ROOT_PASSWD="snapdog"

# Linux 6.6 LTS (rpi-6.6.y, 6.6.78, 2025-03-26)
BR2_LINUX_KERNEL_CUSTOM_TARBALL_LOCATION="$(call github,raspberrypi,linux,bba53a117a4a5c29da892962332ff1605990e17a)/linux-bba53a117a4a5c29da892962332ff1605990e17a.tar.gz"
BR2_LINUX_KERNEL_VERSION="custom"
BR2_LINUX_KERNEL_CONFIG_FRAGMENT_FILES="../snapdog-os/buildroot/uncompressed-modules.fragment"
BR2_PACKAGE_HOST_LINUX_HEADERS_CUSTOM_6_6=y

BR2_ROOTFS_OVERLAY="../snapdog-os/buildroot/board/raspberrypi/overlay/"
BR2_PER_PACKAGE_DIRECTORIES=n
BR2_DOWNLOAD_FORCE_CHECK_HASHES=n
