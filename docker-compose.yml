services:
  build:
    build: .
    volumes:
      - .:/build/snapdog-os
      - buildroot:/build/buildroot
      - output:/build/buildroot-pi4
    working_dir: /build/snapdog-os
    command: |
      bash -c "
        set -e

        echo '── Setup buildroot ──'
        if [ ! -d /build/buildroot/.git ]; then
          git clone --depth 1 --branch 2025.02 https://github.com/buildroot/buildroot /build/buildroot
        fi
        echo '── Inject snapdog-ctrl binary ──'
        if [ -f /build/snapdog-os/snapdog-ctrl-binary ]; then
          mkdir -p /build/snapdog-os/buildroot/board/raspberrypi/overlay/usr/bin
          cp /build/snapdog-os/snapdog-ctrl-binary \
            /build/snapdog-os/buildroot/board/raspberrypi/overlay/usr/bin/snapdog-ctrl
          chmod 755 /build/snapdog-os/buildroot/board/raspberrypi/overlay/usr/bin/snapdog-ctrl
          echo 'Using pre-built snapdog-ctrl binary'
        else
          echo 'ERROR: No snapdog-ctrl-binary found. Refusing to build an image without snapdog-ctrl.'
          exit 1
        fi

        echo '── Configure pi4 ──'
        mkdir -p /build/buildroot-pi4
        cd /build/buildroot && make raspberrypi4_64_defconfig
        mv /build/buildroot/.config /build/buildroot-pi4/.config
        /build/snapdog-os/buildroot/scripts/apply-config-overrides \
          /build/buildroot-pi4/.config \
          /build/snapdog-os/buildroot/configs/override.conf \
          BR2_PACKAGE_SNAPDOG_OS_ALL

        echo '── Build ──'
        cd /build/buildroot
        make O=/build/buildroot-pi4 BR2_EXTERNAL=/build/snapdog-os/buildroot SNAPDOG_PI_VERSION=4 olddefconfig
        make O=/build/buildroot-pi4 BR2_EXTERNAL=/build/snapdog-os/buildroot SNAPDOG_PI_VERSION=4 -j\$(nproc)

        echo '── Done ──'
        ls -lh /build/buildroot-pi4/images/sdcard.img
      "

volumes:
  buildroot:
  output:
