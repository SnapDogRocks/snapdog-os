name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git describe needs history

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: snapdog-ctrl

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      # WebUI
      - name: Install webui deps
        run: cd snapdog-ctrl/webui && npm ci

      - name: Lint webui
        run: cd snapdog-ctrl/webui && npx eslint .

      - name: Typecheck webui
        run: cd snapdog-ctrl/webui && npx tsc --noEmit

      - name: Build webui
        run: cd snapdog-ctrl/webui && npm run build

      # Rust
      - name: Format
        run: cd snapdog-ctrl && cargo fmt --check

      - name: Clippy
        run: cd snapdog-ctrl && cargo clippy --all-targets

      - name: Test
        run: cd snapdog-ctrl && cargo test

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          working-directory: snapdog-ctrl

  cross-compile:
    name: Cross-compile (aarch64)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: snapdog-ctrl
          key: aarch64

      - name: Install linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-ctrl/webui/package-lock.json

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd snapdog-ctrl/webui && npm ci && npm run build && cd ../..
          cd snapdog-ctrl && cargo build --release --target aarch64-unknown-linux-gnu

      - name: Verify binary
        run: file snapdog-ctrl/target/aarch64-unknown-linux-gnu/release/snapdog-ctrl | grep -q "aarch64"
